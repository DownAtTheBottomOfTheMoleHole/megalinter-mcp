changelog:
  categories:
    - title: 🎉 Features
      labels:
        - feature
        - enhancement
    - title: 🐛 Bug Fixes
      labels:
        - bug
        - bugfix
        - fix
    - title: 📚 Documentation
      labels:
        - documentation
        - docs
    - title: 🔧 Maintenance
      labels:
        - maintenance
        - dependencies
        - chore
    - title: 🏗️ Infrastructure
      labels:
        - ci
        - github-actions
        - workflow

exclude:
  labels:
    - duplicate
    - invalid
    - wontfix
    - skip-changelog
